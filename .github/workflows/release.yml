Good — those three answers lock in a lot. Before I start building, I want to close out the last few architecture decisions, since these are the ones that'll be painful to change once the parser is written.

The one blocker: Player Sheets have no format yet
You've got documented formats for Creatures, Items, NPCs, Locations — nothing for player character sheets. Since the tracker needs to reliably extract HP/AC/ability scores/initiative from these notes, I'd propose mirroring the Creature Statblock format rather than inventing something new. Two big wins to that: it matches the visual language you already use, and it means I can reuse the same parsing logic for both creatures and players instead of writing two separate parsers.

Proposed Player Sheet Format:

# Character Name
*Race Class, Background*

**Armor Class** AC
**Hit Points** Max HP
**Initiative** +X
**Speed** 30 ft.

| STR     | DEX     | CON     | INT     | WIS     | CHA     |
| ------- | ------- | ------- | ------- | ------- | ------- |
| 10 (+0) | 10 (+0) | 10 (+0) | 10 (+0) | 10 (+0) | 10 (+0) |

**Passive Perception** X
**Proficiency Bonus** +X

#PLAYER
I'd also add an Initiative line to your existing Creature Statblock format (right after Speed) — matches how the 2024 5e rules handle it, and it's what lets the "read Initiative field, fall back to DEX" logic actually work. Old statblocks without that line just fall back to DEX automatically, so nothing breaks retroactively.

